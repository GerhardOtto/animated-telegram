on:
  pull_request:
    branches:
      - master

name: test

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.head_ref != 'release-please--branches--master' }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test ./...
